name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*' # This will trigger the workflow on tag pushes that start with 'v'
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    # Fixing the dependency issue by modifying the pom.xml
    - name: Fix POM dependency
      run: |
        # Make the MythicDungeons dependency optional to prevent build failures
        sed -i '/<groupId>net.playavalon<\/groupId>/,/<\/dependency>/ s/<scope>provided<\/scope>/<scope>provided<\/scope>\n            <optional>true<\/optional>/' pom.xml
    
    - name: Build with Maven
      run: mvn -B package --file pom.xml
      
    # The following steps only run when a tag is pushed
    - name: Check if this is a tag push
      id: check-tag
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          echo "IS_TAG=true" >> $GITHUB_ENV
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        fi
    
    - name: Create GitHub Release
      if: env.IS_TAG == 'true'
      uses: softprops/action-gh-release@v1
      with:
        name: MyWorlds Version ${{ env.VERSION }}
        files: |
          target/MyWorlds-*.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # Skip the dependency graph update as it's causing issues with failed builds
    # - name: Update dependency graph
    #   uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
