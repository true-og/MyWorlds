name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*' # This will trigger the workflow on tag pushes that start with 'v'
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    # Fix dependencies properly using XMLStarlet
    - name: Install XMLStarlet
      run: sudo apt-get install -y xmlstarlet
    
    - name: Fix POM dependencies
      run: |
        # Create a backup
        cp pom.xml pom.xml.bak
        
        # Remove the MythicDungeons dependency using XMLStarlet
        xmlstarlet ed -L \
          -d "//dependency[groupId='net.playavalon']" \
          pom.xml
        
        echo "Modified pom.xml to remove problematic dependencies"
    
    - name: Build with Maven
      run: mvn -B package -Dmaven.test.skip=true --file pom.xml
      
    # The following steps only run when a tag is pushed
    - name: Check if this is a tag push
      id: check-tag
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          echo "IS_TAG=true" >> $GITHUB_ENV
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        fi
    
    - name: List files in target directory
      run: |
        echo "Files in target directory:"
        find target -type f -name "*.jar" | sort
    
    - name: Find JAR file
      if: env.IS_TAG == 'true'
      id: find-jar
      run: |
        # Look for the shaded JAR with 'all' classifier
        JAR_PATH=$(find target -name "MyWorlds-*-all.jar" -type f | head -n 1)
        if [[ -z "$JAR_PATH" ]]; then
          # Fall back to any JAR if the specific one isn't found
          JAR_PATH=$(find target -name "MyWorlds-*.jar" -type f | grep -v 'original' | head -n 1)
        fi
        
        if [[ -n "$JAR_PATH" ]]; then
          echo "JAR_PATH=$JAR_PATH" >> $GITHUB_ENV
          echo "Found JAR at: $JAR_PATH"
        else
          echo "No JAR file found in target directory!"
          exit 1
        fi
    
    - name: Create GitHub Release
      if: env.IS_TAG == 'true' && env.JAR_PATH != ''
      uses: softprops/action-gh-release@v1
      with:
        name: MyWorlds Version ${{ env.VERSION }}
        files: ${{ env.JAR_PATH }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
